<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">A gate creates room for redesign</title>
  <desc id="desc">A plan moves through red tests and implementation to a deliberate gate. Work can continue to commit, or fresh evidence can lead through a better question and a redesigned boundary before returning to commit.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#6b6a70"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c85032"/>
    </marker>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .label{font-size:27px;font-weight:750;fill:#1c1c20}
      .small{font-size:22px;font-weight:520;fill:#59585e}
      .caps{font-size:19px;font-weight:750;letter-spacing:2px;fill:#1e8c78}
      .line{fill:none;stroke:#6b6a70;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow)}
      .branch{fill:none;stroke:#c85032;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-rust)}
    </style>
  </defs>

  <rect width="1200" height="630" fill="#faf9f7"/>

  <text x="58" y="78" class="sans caps">IMPLEMENTATION MOMENTUM</text>
  <line x1="58" y1="96" x2="1142" y2="96" stroke="#d8d6d1" stroke-width="2"/>

  <rect x="58" y="168" width="166" height="92" rx="20" fill="#ffffff" stroke="#d8d6d1" stroke-width="2"/>
  <text x="108" y="224" class="sans label">Plan</text>
  <path d="M224 214 H278" class="line"/>

  <rect x="298" y="168" width="176" height="92" rx="20" fill="#fff1ec" stroke="#c85032" stroke-width="2"/>
  <text x="337" y="208" class="sans label">Red tests</text>
  <text x="346" y="239" class="sans small">fail first</text>
  <path d="M474 214 H528" class="line"/>

  <rect x="548" y="168" width="194" height="92" rx="20" fill="#eef7f4" stroke="#1e8c78" stroke-width="2"/>
  <text x="589" y="224" class="sans label">Implement</text>
  <path d="M742 214 H788" class="line"/>

  <circle cx="852" cy="214" r="62" fill="#fff4e8" stroke="#d28c28" stroke-width="4"/>
  <circle cx="852" cy="214" r="45" fill="none" stroke="#d28c28" stroke-width="2" stroke-dasharray="5 7"/>
  <text x="818" y="207" class="sans caps" fill="#a56613">PAUSE</text>
  <text x="820" y="239" class="sans small">Gate</text>

  <path d="M914 214 H988" class="line"/>
  <text x="921" y="188" class="sans small">approve</text>
  <rect x="1008" y="168" width="134" height="92" rx="20" fill="#eef7f4" stroke="#1e8c78" stroke-width="3"/>
  <text x="1031" y="224" class="sans label">Commit</text>

  <path d="M852 276 V326 C852 346 832 352 810 352 H488 V366" class="branch"/>
  <text x="879" y="322" class="sans small" fill="#a63f27">fresh context</text>

  <rect x="386" y="374" width="204" height="88" rx="20" fill="#ffffff" stroke="#c85032" stroke-width="2"/>
  <text x="417" y="410" class="sans label">Inspect</text>
  <text x="417" y="441" class="sans small">the evidence</text>
  <path d="M590 418 H640" class="branch"/>

  <rect x="660" y="374" width="216" height="88" rx="20" fill="#ffffff" stroke="#c85032" stroke-width="2"/>
  <text x="688" y="410" class="sans label">Ask better</text>
  <text x="688" y="441" class="sans small">questions</text>
  <path d="M876 418 H926" class="branch"/>

  <rect x="946" y="374" width="196" height="88" rx="20" fill="#fff1ec" stroke="#c85032" stroke-width="3"/>
  <text x="974" y="410" class="sans label">Redesign</text>
  <text x="974" y="441" class="sans small">the boundary</text>

  <path d="M1044 374 C1044 323 1074 310 1074 280" class="branch"/>

  <path d="M58 532 H344" fill="none" stroke="#c85032" stroke-width="4" stroke-linecap="round"/>
  <text x="58" y="578" class="sans label" fill="#a63f27">The design changed here.</text>
  <text x="386" y="578" class="sans small">The gate did more than verify completed work.</text>
</svg>
