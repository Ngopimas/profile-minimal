<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The spec is a living control loop</title>
  <desc id="desc">Human intent becomes a living spec that guides planning, implementation, and evidence. A gate either approves the work or feeds a learned decision back into the spec before the next phase.</desc>
  <defs>
    <marker id="arrow-ink" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#6b6a70"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#1e8c78"/>
    </marker>
    <marker id="arrow-rust" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#c85032"/>
    </marker>
    <style>
      .sans{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
      .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
      .label{font-size:27px;font-weight:750;fill:#1c1c20}
      .small{font-size:22px;font-weight:520;fill:#59585e}
      .caps{font-size:20px;font-weight:750;letter-spacing:2px;fill:#1e8c78}
      .line{fill:none;stroke:#6b6a70;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-ink)}
      .feedback{fill:none;stroke:#c85032;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow-rust)}
    </style>
  </defs>

  <rect width="1200" height="630" fill="#faf9f7"/>

  <rect x="52" y="207" width="230" height="172" rx="22" fill="#ffffff" stroke="#d8d6d1" stroke-width="2"/>
  <circle cx="88" cy="245" r="10" fill="#c85032"/>
  <text x="112" y="254" class="sans label">Human intent</text>
  <text x="88" y="302" class="sans small">constraints</text>
  <text x="88" y="334" class="sans small">refusal · risk · taste</text>

  <path d="M282 293 H370" class="line"/>

  <path d="M390 145 H655 L695 185 V421 H390 Z" fill="#eef7f4" stroke="#1e8c78" stroke-width="3"/>
  <path d="M655 145 V185 H695" fill="none" stroke="#1e8c78" stroke-width="3"/>
  <text x="430" y="201" class="sans caps">LIVING SPEC</text>
  <text x="430" y="249" class="sans label">Shared contract</text>
  <line x1="430" y1="275" x2="655" y2="275" stroke="#b8d9d1" stroke-width="2"/>
  <text x="430" y="316" class="mono small">MISSION</text>
  <text x="430" y="351" class="mono small">CONTRACTS</text>
  <text x="430" y="386" class="mono small">POLICIES</text>

  <path d="M695 293 H772" class="line"/>

  <rect x="792" y="132" width="272" height="286" rx="24" fill="#ffffff" stroke="#d8d6d1" stroke-width="2"/>
  <rect x="816" y="160" width="224" height="62" rx="14" fill="#f5f4f2"/>
  <text x="842" y="201" class="sans label">Plan</text>
  <path d="M928 222 V244" class="line"/>
  <rect x="816" y="250" width="224" height="62" rx="14" fill="#f5f4f2"/>
  <text x="842" y="291" class="sans label">Build</text>
  <path d="M928 312 V334" class="line"/>
  <rect x="816" y="340" width="224" height="54" rx="14" fill="#eef7f4"/>
  <text x="842" y="376" class="sans label">Evidence</text>

  <path d="M928 418 V448" class="line"/>
  <circle cx="928" cy="503" r="54" fill="#fff4e8" stroke="#d28c28" stroke-width="3"/>
  <text x="894" y="512" class="sans label">Gate</text>

  <path d="M982 503 H1040" fill="none" stroke="#1e8c78" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
  <rect x="1060" y="466" width="112" height="74" rx="18" fill="#eef7f4" stroke="#1e8c78" stroke-width="3"/>
  <text x="1081" y="512" class="sans small" fill="#1e8c78">Commit</text>

  <path d="M897 547 C835 600 665 597 579 529 C547 504 536 467 536 433" class="feedback"/>
  <rect x="628" y="524" width="196" height="58" rx="16" fill="#fff1ec" stroke="#c85032" stroke-width="2"/>
  <text x="654" y="561" class="sans small" fill="#a63f27">Spec sync</text>
  <text x="52" y="581" class="sans small">A learned decision returns before the next phase begins.</text>
</svg>
