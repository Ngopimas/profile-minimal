<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Evidence trail for an autonomous research pipeline</title>
  <desc id="desc">A dark editorial diagram showing an agent idea moving through evidence files, diagnostics, a pre-rebalance gate, and a dashboard decision.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.65" />
    </pattern>
    <linearGradient id="panelGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8" />
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.42" />
    </filter>
    <style>
      .bg { fill: #020617; }
      .panel { fill: url(#panelGlow); stroke: #334155; stroke-width: 1.4; filter: url(#softShadow); }
      .title { fill: #f8fafc; font: 800 34px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.03em; }
      .subtitle { fill: #94a3b8; font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .kicker { fill: #38bdf8; font: 800 12px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: 0.14em; }
      .label { fill: #f8fafc; font: 800 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #cbd5e1; font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #94a3b8; font: 600 10.5px Inter, ui-sans-serif, system-ui, sans-serif; }
      .mono { fill: #e2e8f0; font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .box { rx: 18; stroke-width: 1.6; }
      .idea { fill: #082f49; stroke: #38bdf8; }
      .evidence { fill: #064e3b; stroke: #34d399; }
      .diagnostic { fill: #4c1d95; stroke: #a78bfa; }
      .gate { fill: #881337; stroke: #fb7185; }
      .decision { fill: #78350f; stroke: #fbbf24; }
      .line { fill: none; stroke: #94a3b8; stroke-width: 2.3; marker-end: url(#arrow); }
      .mutedLine { fill: none; stroke: #475569; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .receipt { fill: rgba(15, 23, 42, 0.92); stroke: #334155; stroke-width: 1.2; }
      .receiptText { fill: #cbd5e1; font: 700 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .ok { fill: #22c55e; }
      .warn { fill: #f59e0b; }
      .stop { fill: #fb7185; }
      .pill { fill: rgba(15, 23, 42, 0.86); stroke: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="675" />
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.56" />
  <rect class="panel" x="48" y="42" width="1104" height="590" rx="30" />

  <text class="kicker" x="88" y="92">HERMES AGENT RESEARCH SYSTEM</text>
  <text class="title" x="88" y="132">Agents are useful when they leave receipts</text>
  <text class="subtitle" x="88" y="162">The pipeline is less about blind automation and more about forcing every decision to leave evidence behind.</text>

  <path class="line" d="M248 282 C286 282 305 282 343 282" />
  <path class="line" d="M515 282 C552 282 571 282 608 282" />
  <path class="line" d="M779 282 C816 282 834 282 871 282" />
  <path class="mutedLine" d="M978 358 C906 460 680 485 469 442 C331 414 247 370 205 333" />

  <rect class="box idea" x="88" y="210" width="160" height="144" />
  <text class="label" x="118" y="246">Agent idea</text>
  <text class="small" x="118" y="277">European names</text>
  <text class="small" x="118" y="301">PEA constraints</text>
  <text class="small" x="118" y="325">Hypothesis text</text>

  <rect class="box evidence" x="343" y="210" width="172" height="144" />
  <text class="label" x="373" y="246">Evidence</text>
  <text class="small" x="373" y="277">Backtest result</text>
  <text class="small" x="373" y="301">Costs included</text>
  <text class="small" x="373" y="325">Sharpe / MaxDD</text>

  <rect class="box diagnostic" x="608" y="210" width="171" height="144" />
  <text class="label" x="638" y="246">Diagnostics</text>
  <text class="small" x="638" y="277">Clone detection</text>
  <text class="small" x="638" y="301">Data freshness</text>
  <text class="small" x="638" y="325">Unsupported ideas</text>

  <rect class="box gate" x="871" y="210" width="178" height="144" />
  <text class="label" x="901" y="246">Gate</text>
  <text class="small" x="901" y="277">Proceed</text>
  <text class="small" x="901" y="301">Hold</text>
  <text class="small" x="901" y="325">Abort</text>

  <rect class="receipt" x="132" y="414" width="208" height="92" rx="14" />
  <text class="receiptText" x="154" y="444">strategy_pool.json</text>
  <text class="tiny" x="154" y="470">ideas, metrics, status</text>
  <circle class="ok" cx="304" cy="441" r="6" />

  <rect class="receipt" x="380" y="414" width="224" height="92" rx="14" />
  <text class="receiptText" x="402" y="444">assumption_check.json</text>
  <text class="tiny" x="402" y="470">fitness, regime, earnings</text>
  <circle class="warn" cx="562" cy="441" r="6" />

  <rect class="receipt" x="644" y="414" width="214" height="92" rx="14" />
  <text class="receiptText" x="666" y="444">portfolio_state.json</text>
  <text class="tiny" x="666" y="470">paper positions, history</text>
  <circle class="ok" cx="822" cy="441" r="6" />

  <rect class="box decision" x="910" y="398" width="188" height="124" />
  <text class="label" x="944" y="438">Dashboard</text>
  <text class="mono" x="944" y="470">Decision: HOLD</text>
  <text class="tiny" x="944" y="495">visible from mobile</text>

  <rect class="pill" x="88" y="554" width="252" height="46" rx="23" />
  <circle cx="118" cy="577" r="6" fill="#38bdf8" />
  <text class="tiny" x="136" y="581">Agents generate candidates</text>

  <rect class="pill" x="372" y="554" width="258" height="46" rx="23" />
  <circle cx="402" cy="577" r="6" fill="#34d399" />
  <text class="tiny" x="420" y="581">Backtests leave evidence</text>

  <rect class="pill" x="662" y="554" width="238" height="46" rx="23" />
  <circle cx="692" cy="577" r="6" fill="#fb7185" />
  <text class="tiny" x="710" y="581">Gate can block trades</text>

  <rect class="pill" x="932" y="554" width="166" height="46" rx="23" />
  <circle cx="962" cy="577" r="6" fill="#fbbf24" />
  <text class="tiny" x="980" y="581">Static, inspectable</text>
</svg>
