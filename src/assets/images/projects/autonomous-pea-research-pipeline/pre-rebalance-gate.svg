<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Pre-rebalance gate flow</title>
  <desc id="desc">Four checks-strategy fitness, market regime, data freshness, and earnings risk-feed a recorded gate decision that can proceed, hold, or abort.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.7"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#94a3b8"/></marker>
    <style>
      .bg{fill:#020617}.card{fill:#0f172a;stroke:#334155;stroke-width:1.5}
      .title{fill:#e2e8f0;font:700 30px Inter,ui-sans-serif,system-ui,sans-serif}.subtitle{fill:#94a3b8;font:500 16px Inter,ui-sans-serif,system-ui,sans-serif}
      .label{fill:#f8fafc;font:700 19px Inter,ui-sans-serif,system-ui,sans-serif}.small{fill:#cbd5e1;font:500 16px Inter,ui-sans-serif,system-ui,sans-serif}.tiny{fill:#94a3b8;font:500 14px Inter,ui-sans-serif,system-ui,sans-serif}
      .check{fill:#111827;stroke:#38bdf8;stroke-width:1.8}.warn{fill:#451a03;stroke:#f59e0b;stroke-width:1.8}.stop{fill:#450a0a;stroke:#f87171;stroke-width:1.8}.go{fill:#052e16;stroke:#4ade80;stroke-width:1.8}
      .line{fill:none;stroke:#94a3b8;stroke-width:2.2;marker-end:url(#arrow)}.dash{fill:none;stroke:#fb7185;stroke-width:2.2;stroke-dasharray:7 7;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/><rect width="1200" height="675" fill="url(#grid)" opacity="0.55"/>
  <rect class="card" x="52" y="42" width="1096" height="590" rx="28"/>
  <text class="title" x="92" y="98">The pre-rebalance gate</text>
  <text class="subtitle" x="92" y="129">A backtest is not enough. The trade must still make sense now.</text>

  <rect class="check" x="70" y="210" width="220" height="130" rx="18"/>
  <text class="label" x="94" y="250">Strategy fitness</text>
  <text class="small" x="94" y="286">Is performance</text><text class="small" x="94" y="312">still sane?</text>

  <rect class="check" x="350" y="210" width="220" height="130" rx="18"/>
  <text class="label" x="374" y="250">Market regime</text>
  <text class="small" x="374" y="286">Does the setup</text><text class="small" x="374" y="312">still fit?</text>

  <rect class="check" x="630" y="210" width="220" height="130" rx="18"/>
  <text class="label" x="654" y="250">Data freshness</text>
  <text class="small" x="654" y="286">Are inputs</text><text class="small" x="654" y="312">recent enough?</text>

  <rect class="check" x="910" y="210" width="220" height="130" rx="18"/>
  <text class="label" x="934" y="250">Earnings risk</text>
  <text class="small" x="934" y="286">Are we trading</text><text class="small" x="934" y="312">into news?</text>

  <path class="line" d="M180 340 C180 386 340 401 476 414"/><path class="line" d="M460 340 C460 380 510 399 548 414"/>
  <path class="line" d="M740 340 C740 380 690 399 652 414"/><path class="line" d="M1020 340 C1020 386 860 401 724 414"/>

  <rect class="card" x="390" y="414" width="420" height="96" rx="18"/>
  <text class="label" x="520" y="449">Gate decision</text>
  <text class="tiny" x="470" y="478">No silent rebalance.</text><text class="tiny" x="470" y="498">Every decision is written to JSON.</text>

  <path class="line" d="M500 510 L312 558"/><path class="line" d="M600 510 L600 558"/><path class="dash" d="M700 510 L888 558"/>
  <rect class="go" x="190" y="558" width="244" height="58" rx="18"/><text class="label" x="276" y="594">Proceed</text>
  <rect class="warn" x="478" y="558" width="244" height="58" rx="18"/><text class="label" x="578" y="594">Hold</text>
  <rect class="stop" x="766" y="558" width="244" height="58" rx="18"/><text class="label" x="866" y="594">Abort</text>
</svg>
