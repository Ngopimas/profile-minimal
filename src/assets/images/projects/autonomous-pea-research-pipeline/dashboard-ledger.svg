<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Static dashboard snapshot for an autonomous research pipeline</title>
  <desc id="desc">A stylized dark dashboard snapshot showing a pre-rebalance gate, evidence files, strategy diagnostics, and paper portfolio state without exposing private holdings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.55" stop-color="#07111f" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827" />
      <stop offset="1" stop-color="#0b1120" />
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 L0 0 0 44" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.55" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.48" />
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .shell { fill: #050816; stroke: #1f2937; stroke-width: 1.5; filter: url(#shadow); }
      .topbar { fill: #0b1120; stroke: #1f2937; stroke-width: 1; }
      .card { fill: url(#panel); stroke: #263244; stroke-width: 1.2; }
      .card2 { fill: #07111f; stroke: #263244; stroke-width: 1.2; }
      .title { fill: #f8fafc; font: 800 34px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.03em; }
      .subtitle { fill: #94a3b8; font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .nav { fill: #cbd5e1; font: 700 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #e5e7eb; font: 800 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #94a3b8; font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #64748b; font: 600 10.5px Inter, ui-sans-serif, system-ui, sans-serif; }
      .mono { fill: #dbeafe; font: 700 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .metric { fill: #f8fafc; font: 900 30px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.04em; }
      .pill { fill: rgba(15, 23, 42, 0.92); stroke: #334155; stroke-width: 1; }
      .green { fill: #22c55e; }
      .amber { fill: #f59e0b; }
      .red { fill: #fb7185; }
      .blue { fill: #38bdf8; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 3; stroke-linecap: round; }
      .line2 { fill: none; stroke: #34d399; stroke-width: 3; stroke-linecap: round; }
      .barBg { fill: #172033; }
      .bar { fill: #38bdf8; }
      .bar2 { fill: #34d399; }
      .bar3 { fill: #f59e0b; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760" />
  <rect width="1200" height="760" fill="url(#grid)" opacity="0.45" />

  <rect class="shell" x="58" y="54" width="1084" height="652" rx="30" />
  <rect class="topbar" x="58" y="54" width="1084" height="74" rx="30" />
  <rect class="topbar" x="58" y="98" width="1084" height="30" />

  <circle cx="94" cy="90" r="7" fill="#fb7185" />
  <circle cx="118" cy="90" r="7" fill="#f59e0b" />
  <circle cx="142" cy="90" r="7" fill="#22c55e" />
  <text class="nav" x="186" y="95">Dashboard</text>
  <text class="nav" x="284" y="95">Signals</text>
  <text class="nav" x="366" y="95">Evidence</text>
  <text class="nav" x="456" y="95">Agent log</text>
  <rect class="pill" x="927" y="75" width="164" height="32" rx="16" />
  <circle class="green" cx="952" cy="91" r="5" />
  <text class="small" x="968" y="95">generated from JSON</text>

  <text class="title" x="92" y="174">Research dashboard</text>
  <text class="subtitle" x="92" y="201">Private static view generated from pipeline artifacts. Values redacted for the public article.</text>

  <rect class="card" x="92" y="232" width="318" height="150" rx="22" />
  <text class="label" x="122" y="272">Pre-rebalance gate</text>
  <rect class="pill" x="122" y="292" width="104" height="34" rx="17" />
  <circle class="amber" cx="144" cy="309" r="6" />
  <text class="mono" x="160" y="313">HOLD</text>
  <text class="small" x="122" y="352">No silent rebalance. Gate decision written to</text>
  <text class="mono" x="122" y="370">assumption_check.json</text>

  <rect class="card" x="438" y="232" width="318" height="150" rx="22" />
  <text class="label" x="468" y="272">Evidence health</text>
  <text class="metric" x="468" y="316">42</text>
  <text class="small" x="526" y="310">tested strategies</text>
  <rect class="barBg" x="468" y="342" width="220" height="10" rx="5" />
  <rect class="bar2" x="468" y="342" width="136" height="10" rx="5" />
  <text class="tiny" x="468" y="371">viability requires Sharpe and drawdown gates</text>

  <rect class="card" x="784" y="232" width="318" height="150" rx="22" />
  <text class="label" x="814" y="272">Agent activity</text>
  <text class="metric" x="814" y="316">OK</text>
  <text class="small" x="872" y="310">latest run completed</text>
  <text class="mono" x="814" y="350">data -> backtest -> gate -> dashboard</text>
  <text class="tiny" x="814" y="371">logs kept as first-class outputs</text>

  <rect class="card2" x="92" y="414" width="514" height="236" rx="22" />
  <text class="label" x="122" y="454">Evidence trail</text>
  <rect class="pill" x="122" y="480" width="202" height="36" rx="18" />
  <circle class="blue" cx="148" cy="498" r="6" />
  <text class="mono" x="166" y="502">strategy_pool.json</text>
  <rect class="pill" x="122" y="530" width="240" height="36" rx="18" />
  <circle class="amber" cx="148" cy="548" r="6" />
  <text class="mono" x="166" y="552">assumption_check.json</text>
  <rect class="pill" x="122" y="580" width="214" height="36" rx="18" />
  <circle class="green" cx="148" cy="598" r="6" />
  <text class="mono" x="166" y="602">paper_orders.json</text>

  <path class="line" d="M400 592 C430 548 462 528 508 514" />
  <path class="line2" d="M402 532 C448 472 496 478 554 444" />
  <circle class="blue" cx="510" cy="514" r="5" />
  <circle class="green" cx="554" cy="444" r="5" />

  <rect class="card2" x="634" y="414" width="468" height="236" rx="22" />
  <text class="label" x="664" y="454">Diagnostics</text>
  <text class="small" x="664" y="488">Clone detection</text>
  <rect class="barBg" x="822" y="478" width="216" height="12" rx="6" />
  <rect class="bar" x="822" y="478" width="166" height="12" rx="6" />
  <text class="small" x="664" y="526">Data freshness</text>
  <rect class="barBg" x="822" y="516" width="216" height="12" rx="6" />
  <rect class="bar2" x="822" y="516" width="190" height="12" rx="6" />
  <text class="small" x="664" y="564">Unsupported ideas</text>
  <rect class="barBg" x="822" y="554" width="216" height="12" rx="6" />
  <rect class="bar3" x="822" y="554" width="122" height="12" rx="6" />
  <text class="tiny" x="664" y="613">The dashboard shows refusal paths, not only winners.</text>
</svg>
