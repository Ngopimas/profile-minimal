<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous research pipeline dashboard thumbnail</title>
  <desc id="desc">A dark product-style thumbnail showing a generated dashboard, JSON evidence artifacts, diagnostics, and a pre-rebalance hold gate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#020617" />
      <stop offset="0.55" stop-color="#07111f" />
      <stop offset="1" stop-color="#020617" />
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0 L0 0 0 44" fill="none" stroke="#1e293b" stroke-width="0.8" opacity="0.55" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.48" />
    </filter>
    <style>
      .bg { fill: url(#bg); }
      .shell { fill: #050816; stroke: #1f2937; stroke-width: 1.5; filter: url(#shadow); }
      .top { fill: #0b1120; stroke: #1f2937; stroke-width: 1; }
      .card { fill: #0f172a; stroke: #263244; stroke-width: 1.2; }
      .card2 { fill: #07111f; stroke: #263244; stroke-width: 1.2; }
      .title { fill: #f8fafc; font: 900 42px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.04em; }
      .subtitle { fill: #94a3b8; font: 600 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #e5e7eb; font: 800 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #94a3b8; font: 600 13px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #64748b; font: 600 11px Inter, ui-sans-serif, system-ui, sans-serif; }
      .mono { fill: #dbeafe; font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .metric { fill: #f8fafc; font: 900 32px Inter, ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.04em; }
      .pill { fill: #111827; stroke: #334155; stroke-width: 1; }
      .green { fill: #22c55e; }
      .amber { fill: #f59e0b; }
      .blue { fill: #38bdf8; }
      .red { fill: #fb7185; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 4; stroke-linecap: round; }
      .line2 { fill: none; stroke: #34d399; stroke-width: 4; stroke-linecap: round; }
      .barBg { fill: #172033; }
      .bar { fill: #38bdf8; }
      .bar2 { fill: #34d399; }
      .bar3 { fill: #f59e0b; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="675" />
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.42" />
  <text class="title" x="78" y="112">Autonomous research pipeline</text>
  <text class="subtitle" x="80" y="148">Agents propose. Evidence persists. The gate can say hold.</text>

  <rect class="shell" x="78" y="188" width="1044" height="414" rx="28" />
  <rect class="top" x="78" y="188" width="1044" height="60" rx="28" />
  <rect class="top" x="78" y="218" width="1044" height="30" />
  <circle cx="112" cy="218" r="7" fill="#fb7185" />
  <circle cx="136" cy="218" r="7" fill="#f59e0b" />
  <circle cx="160" cy="218" r="7" fill="#22c55e" />
  <text class="mono" x="202" y="223">/research/index.html</text>
  <rect class="pill" x="906" y="201" width="160" height="34" rx="17" />
  <circle class="green" cx="932" cy="218" r="5" />
  <text class="small" x="948" y="222">static dashboard</text>

  <rect class="card" x="118" y="284" width="292" height="128" rx="20" />
  <text class="label" x="146" y="323">Pre-rebalance gate</text>
  <rect class="pill" x="146" y="344" width="102" height="34" rx="17" />
  <circle class="amber" cx="168" cy="361" r="6" />
  <text class="mono" x="184" y="365">HOLD</text>
  <text class="tiny" x="146" y="392">decision written to JSON</text>

  <rect class="card" x="454" y="284" width="292" height="128" rx="20" />
  <text class="label" x="482" y="323">Evidence</text>
  <text class="metric" x="482" y="366">42</text>
  <text class="small" x="540" y="358">tested strategies</text>
  <rect class="barBg" x="482" y="383" width="196" height="10" rx="5" />
  <rect class="bar2" x="482" y="383" width="126" height="10" rx="5" />

  <rect class="card" x="790" y="284" width="292" height="128" rx="20" />
  <text class="label" x="818" y="323">Diagnostics</text>
  <text class="small" x="818" y="354">clone detection</text>
  <rect class="barBg" x="954" y="344" width="90" height="10" rx="5" />
  <rect class="bar" x="954" y="344" width="72" height="10" rx="5" />
  <text class="small" x="818" y="386">data freshness</text>
  <rect class="barBg" x="954" y="376" width="90" height="10" rx="5" />
  <rect class="bar2" x="954" y="376" width="80" height="10" rx="5" />

  <rect class="card2" x="118" y="448" width="964" height="108" rx="20" />
  <text class="label" x="146" y="489">Receipts</text>
  <rect class="pill" x="146" y="508" width="202" height="32" rx="16" />
  <circle class="blue" cx="170" cy="524" r="5" />
  <text class="mono" x="188" y="528">strategy_pool.json</text>
  <rect class="pill" x="380" y="508" width="236" height="32" rx="16" />
  <circle class="amber" cx="404" cy="524" r="5" />
  <text class="mono" x="422" y="528">assumption_check.json</text>
  <rect class="pill" x="648" y="508" width="212" height="32" rx="16" />
  <circle class="green" cx="672" cy="524" r="5" />
  <text class="mono" x="690" y="528">paper_orders.json</text>
  <path class="line" d="M914 530 C948 498 988 488 1038 478" />
  <path class="line2" d="M920 506 C956 458 1004 452 1052 432" />
</svg>
